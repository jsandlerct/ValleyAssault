<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knight Demo — Siege of the Valley</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a2030; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }

    #hud {
      position: fixed;
      top: 0; left: 0;
      padding: 12px 16px;
      color: #e0e8f0;
      pointer-events: none;
      user-select: none;
    }
    #hud h2 { font-size: 18px; letter-spacing: 1px; text-shadow: 0 1px 3px #000; }
    #hud #status { font-size: 12px; opacity: 0.7; margin-top: 2px; }

    #panels {
      position: fixed;
      bottom: 16px; left: 16px;
      display: flex;
      gap: 12px;
    }
    .panel {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 10px 14px;
      color: #d0d8e8;
      min-width: 130px;
    }
    .panel h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 6px; }
    .panel button {
      display: block;
      width: 100%;
      margin-bottom: 4px;
      padding: 5px 10px;
      background: rgba(192,210,240,0.15);
      border: 1px solid rgba(192,210,240,0.25);
      border-radius: 4px;
      color: #d0d8e8;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .panel button:hover { background: rgba(192,210,240,0.3); }
    .panel button.active { background: rgba(192,210,240,0.45); border-color: #a0c0e8; }

    #hint {
      position: fixed;
      bottom: 16px; right: 16px;
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      text-align: right;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="hud">
    <h2>Knight (on Horseback)</h2>
    <div id="status">Loading models…</div>
  </div>

  <div id="panels">
    <div class="panel">
      <h3>Horse anims</h3>
      <div id="horse-anims"><em style="font-size:11px;opacity:.5">loading…</em></div>
    </div>
    <div class="panel">
      <h3>Rider anims</h3>
      <div id="rider-anims"><em style="font-size:11px;opacity:.5">loading…</em></div>
    </div>
  </div>

  <div id="hint">Drag to orbit &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Right-drag to pan</div>

  <script type="module" src="/src/knight-demo.js"></script>
</body>
</html>
